spring.application.name=ironforge-backend
server.port=8080

# Database Configuration (H2 - In-Memory, default for immediate execution)
spring.datasource.url=jdbc:h2:mem:ironforge_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Database Configuration (MySQL - Uncomment and configure when ready)
# spring.datasource.url=jdbc:mysql://localhost:3306/ironforge_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
# spring.datasource.username=root
# spring.datasource.password=root
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true


# Security / JWT Configuration
# 256-bit signing key generated for HS256 algorithm
jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
# Token expiration time: 86400000 ms (24 Hours)
jwt.expiration=86400000
