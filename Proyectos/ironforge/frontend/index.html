
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IRONFORGE | Elite Fitness Tracking</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Roboto:wght@300;400;700;900&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Roboto', sans-serif;
      background-color: #000000;
      color: #ffffff;
    }
    h1, h2, h3, .font-industrial {
      font-family: 'Oswald', sans-serif;
      text-transform: uppercase;
    }
    /* Estilo para el scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
    }
    ::-webkit-scrollbar-track {
      background: #111;
    }
    ::-webkit-scrollbar-thumb {
      background: #FFC107;
      border-radius: 4px;
    }

    /* Custom FullCalendar Styles for Dark Mode */
    .fc { --fc-border-color: #222; --fc-page-bg-color: #000; }
    .fc-toolbar-title { font-family: 'Oswald', sans-serif !important; text-transform: uppercase; color: #FFC107; font-weight: 900 !important; }
    .fc-button-primary { background-color: #111 !important; border-color: #333 !important; font-weight: bold !important; text-transform: uppercase !important; }
    .fc-button-primary:hover { background-color: #FFC107 !important; color: #000 !important; }
    .fc-button-active { background-color: #FFC107 !important; color: #000 !important; border-color: #FFC107 !important; }
    .fc-daygrid-day-number { font-weight: bold; color: #999; }
    .fc-col-header-cell-cushion { text-transform: uppercase; font-weight: 900; color: #555; font-size: 0.8rem; }
    .fc-event { border: none !important; padding: 2px 5px; cursor: pointer; }
    .fc-day-today { background-color: rgba(255, 193, 7, 0.05) !important; }
  </style>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "@google/genai": "https://esm.sh/@google/genai@^1.40.0",
    "react-router-dom": "https://esm.sh/react-router-dom@^7.13.0",
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
    "recharts": "https://esm.sh/recharts@^3.7.0",
    "@fullcalendar/react": "https://esm.sh/@fullcalendar/react@^6.1.15",
    "@fullcalendar/daygrid": "https://esm.sh/@fullcalendar/daygrid@^6.1.15",
    "@fullcalendar/interaction": "https://esm.sh/@fullcalendar/interaction@^6.1.15"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body>
  <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
